{% extends 'base.html' %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="mb-4 text-center">
            Forgot Password
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label for="email" class="form-label">
                    Registered Email
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your registered email"
                    required
                >

            </div>

            <button type="submit" class="btn-black w-100">
                Send OTP
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="/login">
                Back to Login
            </a>

        </div>

    </div>

</div>

{% endblock %}
