{% extends 'base.html' %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2>Verify OTP</h2>

        <p class="text-center mb-4">
            Enter OTP sent to your email
        </p>

        <form method="POST">

            <input type="text"
                   name="otp"
                   maxlength="6"
                   class="form-control mb-3"
                   placeholder="Enter OTP"
                   required>

            <button class="btn-black">
                Verify OTP
            </button>

        </form>

    </div>

</div>

{% endblock %}
