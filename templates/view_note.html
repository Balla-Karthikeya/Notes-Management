{% extends 'base.html' %}

{% block content %}

<div class="view-card view-note-card">


<h2 class="mb-3">
    {{ note[1] }}
</h2>

<hr>

<div class="text-muted mb-3">
    📅 Created:
    {{ note[3].strftime('%d-%m-%Y') }}
</div>

<div class="text-muted mb-3">
    📂 Category:
    {{ note[5] }}
</div>

<div class="note-full-content">
    {{ note[2] | safe }}
</div>

<div class="mt-4">

    <a href="/editnote/{{ note[0] }}"
       class="btn btn-dark">
        Edit
    </a>

    <a href="/dashboard"
       class="btn btn-secondary">
        Back
    </a>

</div>


</div>

{% endblock %}
